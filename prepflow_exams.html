<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'DM Sans',sans-serif;background:#F8FAFC;color:#0F172A}
nav{background:#fff;border-bottom:1px solid #E2E8F0;padding:0 5%;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.logo{font-size:18px;font-weight:800;color:#0F172A;text-decoration:none}
.logo span{color:#2563EB}
.nav-right{display:flex;gap:16px;align-items:center}
.nav-right a{font-size:13px;font-weight:500;color:#64748B;text-decoration:none}
.nav-right a:hover{color:#0F172A}
.nav-right a.active{color:#2563EB;font-weight:600}
.btn-nav{background:#2563EB;color:#fff!important;padding:7px 18px;border-radius:7px;font-size:13px;font-weight:600!important}

.page{display:flex;min-height:calc(100vh - 60px)}

/* SIDEBAR */
.exam-sidebar{width:220px;min-width:220px;border-right:1px solid #E2E8F0;background:#fff;padding:16px 0;position:sticky;top:60px;height:calc(100vh - 60px);overflow-y:auto}
.sb-section{padding:6px 16px;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#CBD5E1;margin-top:8px}
.exam-tab{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;border-left:3px solid transparent;transition:all .15s;margin:1px 0}
.exam-tab:hover{background:#F8FAFC;border-left-color:#BFDBFE}
.exam-tab.active{background:#EFF6FF;border-left-color:#2563EB}
.exam-tab .et-icon{font-size:16px;width:24px;text-align:center}
.exam-tab .et-info{flex:1}
.exam-tab .et-name{font-size:13px;font-weight:600;color:#334155}
.exam-tab .et-sub{font-size:11px;color:#94A3B8}
.exam-tab.active .et-name{color:#1D4ED8}
.priority-dot{width:6px;height:6px;border-radius:50%;background:#2563EB;flex-shrink:0}

/* MAIN CONTENT */
.exam-main{flex:1;padding:32px 36px;max-width:860px}
.exam-header{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:28px;flex-wrap:wrap}
.exam-title-row{display:flex;align-items:center;gap:12px}
.exam-icon-big{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.ei-ssc{background:#DBEAFE}
.ei-def{background:#DCFCE7}
.exam-header h1{font-size:24px;font-weight:800;letter-spacing:-.5px;color:#0F172A}
.exam-header p{font-size:14px;color:#64748B;margin-top:3px}
.header-badges{display:flex;gap:8px;flex-wrap:wrap}
.hbadge{font-size:12px;font-weight:600;padding:4px 12px;border-radius:100px;border:1.5px solid}
.hb-blue{background:#EFF6FF;border-color:#BFDBFE;color:#1D4ED8}
.hb-green{background:#F0FDF4;border-color:#BBF7D0;color:#15803D}
.hb-amber{background:#FFFBEB;border-color:#FDE68A;color:#92400E}

/* INFO TABS */
.info-tabs{display:flex;gap:0;border-bottom:1px solid #E2E8F0;margin-bottom:24px;overflow-x:auto}
.info-tab{padding:10px 18px;font-size:13px;font-weight:600;color:#94A3B8;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s}
.info-tab:hover{color:#475569}
.info-tab.active{color:#2563EB;border-bottom-color:#2563EB}

.tab-pane{display:none}
.tab-pane.active{display:block}

/* OVERVIEW CARDS */
.overview-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.ov-card{background:#fff;border:1px solid #E2E8F0;border-radius:12px;padding:16px}
.ov-card h4{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#94A3B8;margin-bottom:8px}
.ov-val{font-size:20px;font-weight:800;color:#0F172A;letter-spacing:-.3px}
.ov-sub{font-size:12px;color:#64748B;margin-top:3px}

/* SECTIONS TABLE */
.section-table{background:#fff;border:1px solid #E2E8F0;border-radius:12px;overflow:hidden;margin-bottom:20px}
.st-header{display:grid;padding:12px 16px;background:#F8FAFC;border-bottom:1px solid #E2E8F0;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#94A3B8}
.st-row{display:grid;padding:14px 16px;border-bottom:1px solid #F1F5F9;align-items:center;transition:background .15s}
.st-row:last-child{border-bottom:none}
.st-row:hover{background:#F8FAFC}
.st-row .subj{font-size:14px;font-weight:600;color:#334155}
.st-row .qs{font-size:14px;color:#64748B}
.st-row .marks{font-size:14px;font-weight:700;color:#0F172A}
.st-row .time{font-size:13px;color:#94A3B8}
.importance-bar{height:6px;border-radius:100px;background:#E2E8F0;overflow:hidden;width:80px}
.ib-fill{height:100%;border-radius:100px;background:#2563EB}

/* SYLLABUS */
.syllabus-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.syl-card{background:#fff;border:1px solid #E2E8F0;border-radius:12px;padding:20px}
.syl-card h3{font-size:14px;font-weight:700;color:#0F172A;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.topic-item{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid #F1F5F9}
.topic-item:last-child{border-bottom:none}
.ti-name{font-size:13px;color:#334155;font-weight:500}
.ti-weight{font-size:11px;font-weight:700;padding:2px 8px;border-radius:100px}
.tw-high{background:#DBEAFE;color:#1D4ED8}
.tw-med{background:#F3E8FF;color:#7C3AED}
.tw-low{background:#F1F5F9;color:#64748B}

/* STRATEGY */
.strategy-list{display:flex;flex-direction:column;gap:12px;margin-bottom:20px}
.strat-item{background:#fff;border:1px solid #E2E8F0;border-radius:12px;padding:18px;display:flex;gap:14px}
.strat-icon{font-size:20px;flex-shrink:0;margin-top:1px}
.strat-body h4{font-size:14px;font-weight:700;color:#0F172A;margin-bottom:5px}
.strat-body p{font-size:13px;color:#64748B;line-height:1.65}
.strat-body .tag{display:inline-block;font-size:11px;font-weight:600;background:#EFF6FF;color:#1D4ED8;padding:2px 8px;border-radius:100px;margin-top:6px}

/* PYQ TABLE */
.pyq-list{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.pyq-row{background:#fff;border:1px solid #E2E8F0;border-radius:10px;padding:14px 18px;display:flex;align-items:center;gap:14px;transition:all .2s;cursor:pointer}
.pyq-row:hover{border-color:#BFDBFE;background:#EFF6FF}
.pyq-year{font-size:13px;font-weight:800;color:#1D4ED8;min-width:48px}
.pyq-info{flex:1}
.pyq-name{font-size:13px;font-weight:600;color:#334155}
.pyq-meta{font-size:11px;color:#94A3B8;margin-top:2px}
.pyq-btn{font-size:12px;font-weight:600;color:#2563EB;background:#EFF6FF;border:1px solid #BFDBFE;border-radius:6px;padding:5px 12px;cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif}
.pyq-btn:hover{background:#DBEAFE}

/* YOUTUBE */
.yt-section{margin-bottom:20px}
.yt-url-row{display:flex;gap:10px;margin-bottom:16px}
.yt-input{flex:1;padding:11px 16px;border:1.5px solid #E2E8F0;border-radius:10px;font-size:14px;font-family:'DM Sans',sans-serif;color:#0F172A;outline:none;transition:border .2s}
.yt-input:focus{border-color:#93C5FD}
.yt-input::placeholder{color:#CBD5E1}
.yt-btn{padding:11px 22px;background:#FF0000;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap}
.yt-btn:hover{background:#CC0000}
.yt-channels-label{font-size:12px;font-weight:700;color:#94A3B8;letter-spacing:.5px;margin-bottom:10px}
.yt-channels{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.yt-channel{background:#fff;border:1px solid #E2E8F0;border-radius:10px;padding:14px 18px;display:flex;align-items:center;gap:14px;transition:all .2s}
.yt-channel:hover{border-color:#E2E8F0;background:#FAFAFA}
.yc-avatar{width:40px;height:40px;border-radius:50%;background:#FF0000;display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;font-weight:700;flex-shrink:0}
.yc-info{flex:1}
.yc-name{font-size:14px;font-weight:700;color:#0F172A}
.yc-sub{font-size:12px;color:#94A3B8;margin-top:2px}
.yc-tags{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.yc-tag{font-size:11px;font-weight:600;background:#F8FAFC;border:1px solid #E2E8F0;border-radius:100px;padding:2px 8px;color:#64748B}
.yt-result{background:#fff;border:1px solid #E2E8F0;border-radius:12px;padding:20px;margin-bottom:16px;display:none}
.yt-result.show{display:block}
.yt-result h3{font-size:15px;font-weight:700;color:#0F172A;margin-bottom:8px}
.yt-result p{font-size:13px;color:#64748B;line-height:1.6;margin-bottom:12px}
.yt-transcript{background:#F8FAFC;border:1px solid #E2E8F0;border-radius:8px;padding:14px;font-size:13px;color:#334155;line-height:1.7;max-height:200px;overflow-y:auto;white-space:pre-wrap}
.yt-actions{display:flex;gap:8px;margin-top:12px}
.yt-action-btn{padding:8px 16px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;border:1.5px solid #E2E8F0;background:#fff;color:#475569;transition:all .2s}
.yt-action-btn:hover{border-color:#BFDBFE;background:#EFF6FF;color:#1D4ED8}
.yt-action-btn.primary{background:#2563EB;color:#fff;border-color:#2563EB}

/* CUTOFF */
.cutoff-table{background:#fff;border:1px solid #E2E8F0;border-radius:12px;overflow:hidden}
.ct-head{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;padding:11px 16px;background:#F8FAFC;border-bottom:1px solid #E2E8F0;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#94A3B8}
.ct-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;padding:13px 16px;border-bottom:1px solid #F1F5F9;align-items:center}
.ct-row:last-child{border-bottom:none}
.ct-row:hover{background:#F8FAFC}
.ct-row span{font-size:13px;color:#334155}
.ct-row .year{font-weight:700;color:#0F172A}
.ct-row .score{font-weight:700;color:#1D4ED8}

@media(max-width:768px){
  .exam-sidebar{display:none}
  .exam-main{padding:20px 16px}
  .syllabus-grid{grid-template-columns:1fr}
}
</style>

          <span class="marks">${s.marks}</span>
          <span class="time">${s.time}</span>
          <div class="importance-bar"><div class="ib-fill" style="width:${s.imp}%"></div></div>
        </div>`).join('')}
      </div>
    </div>
    <!-- SYLLABUS -->
    <div class="tab-pane" id="info-syllabus">
      <div class="syllabus-grid">${Object.entries(d.syllabus).map(([sec,topics])=>`
        <div class="syl-card">
          <h3>📌 ${sec}</h3>
          ${topics.map(t=>`<div class="topic-item"><span class="ti-name">${t.t}</span><span class="ti-weight tw-${t.w}">${t.w==='high'?'High':t.w==='med'?'Medium':'Low'}</span></div>`).join('')}
        </div>`).join('')}</div>
    </div>
    <!-- STRATEGY -->
    <div class="tab-pane" id="info-strategy">
      <div class="strategy-list">${d.strategy.map(s=>`
        <div class="strat-item">
          <div class="strat-icon">${s.icon}</div>
          <div class="strat-body">
            <h4>${s.title}</h4>
            <p>${s.text}</p>
            <span class="tag">${s.tag}</span>
          </div>
        </div>`).join('')}</div>
    </div>
    <!-- PYQ -->
    <div class="tab-pane" id="info-pyq">
      <div class="pyq-list">${d.pyqs.map(p=>`
        <div class="pyq-row" onclick="openPyq('${p.name}')">
          <div class="pyq-year">${p.year}</div>
          <div class="pyq-info"><div class="pyq-name">${p.name}</div><div class="pyq-meta">${p.meta}</div></div>
          <button class="pyq-btn">Analyze →</button>
        </div>`).join('')}</div>
    </div>
    <!-- CUTOFF -->
    <div class="tab-pane" id="info-cutoff">
      <div class="cutoff-table">
        <div class="ct-head"><span>Year</span><span>General</span><span>OBC</span><span>SC/ST</span></div>
        ${d.cutoffs.map(c=>`<div class="ct-row"><span class="year">${c.year}</span><span class="score">${c.gen}</span><span>${c.obc}</span><span>${c.sc}</span></div>`).join('')}
      </div>
      <p style="font-size:12px;color:#94A3B8;margin-top:12px">* Cutoffs are approximate Tier I marks. Official SSC/UPSC notifications pe verify karo.</p>
    </div>
    <!-- YOUTUBE -->
    <div class="tab-pane" id="info-youtube">
      <div class="yt-section">
        <div class="yt-url-row">
          <input class="yt-input" id="ytInput" placeholder="YouTube video link paste karo — transcript + summary milega" type="url"/>
          <button class="yt-btn" onclick="loadYT()">▶ Load</button>
        </div>
        <div class="yt-result" id="ytResult">
          <h3 id="ytTitle"></h3>
          <p id="ytDesc"></p>
          <div class="yt-transcript" id="ytTranscript"></div>
          <div class="yt-actions">
            <button class="yt-action-btn primary" onclick="sendToMentor()">🤖 Mentor Se Analyze Karao</button>
            <button class="yt-action-btn" onclick="copyTranscript()">📋 Copy Transcript</button>
          </div>
        </div>
        <div class="yt-channels-label">RECOMMENDED CHANNELS FOR ${d.name.toUpperCase()}</div>
        <div class="yt-channels">${d.ytChannels.map(c=>`
          <div class="yt-channel">
            <div class="yc-avatar">${c.init}</div>
            <div class="yc-info">
              <div class="yc-name">${c.name}</div>
              <div class="yc-sub">${c.subs}</div>
              <div class="yc-tags">${c.tags.map(t=>`<span class="yc-tag">${t}</span>`).join('')}</div>
            </div>
          </div>`).join('')}
        </div>
      </div>
    </div>
  `;
}

function switchInfo(tab, el){
  document.querySelectorAll('.info-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('info-'+tab).classList.add('active');
}

function openPyq(name){
  window.location.href=`prepflow_pdfloader.html`;
}

async function loadYT(){
  const url=document.getElementById('ytInput').value.trim();
  if(!url||!url.includes('youtube')){alert('Valid YouTube URL daalo!');return;}
  const res=document.getElementById('ytResult');
  res.classList.add('show');
  const vid=url.match(/(?:v=|youtu\.be\/)([^&\n?#]+)/)?.[1]||'unknown';
  document.getElementById('ytTitle').textContent='Video load ho raha hai...';
  document.getElementById('ytDesc').textContent='YouTube video ka summary AI se generate ho raha hai...';
  document.getElementById('ytTranscript').textContent='';
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:800,
        system:`Tu PrepFlow ka AI mentor hai. User ne ek YouTube video URL share kiya hai. URL se video ID extract karo aur ek helpful study summary banao. Hinglish mein bolna. Format: Title guess karo, Key topics list karo, Study tips do.`,
        messages:[{role:'user',content:`Is YouTube video ke baare mein study summary banao: ${url}\n\nVideo ID: ${vid}\nExam context: ${EXAMS[currentExam].name}\n\nKey topics aur study tips do jo is exam ke liye relevant ho.`}]
      })
    });
    const data=await resp.json();
    const text=data.content?.[0]?.text||'Video summary generate nahi ho payi.';
    document.getElementById('ytTitle').textContent=`YouTube Video — ${EXAMS[currentExam].name} Relevant`;
    document.getElementById('ytDesc').textContent='AI ne is video ka study summary banaya hai:';
    document.getElementById('ytTranscript').textContent=text;
  }catch(e){
    document.getElementById('ytTitle').textContent='YouTube Video Summary';
    document.getElementById('ytDesc').textContent='AI analysis:';
    document.getElementById('ytTranscript').textContent=`${EXAMS[currentExam].name} ke liye yeh video helpful ho sakta hai.\n\nNote: Full transcript ke liye video ke description mein subtitles ya chapters check karo. PrepFlow mentor se is topic ke baare mein detailed guidance le sakte ho.`;
  }
}

function sendToMentor(){
  const t=document.getElementById('ytTranscript').textContent;
  localStorage.setItem('pf_context',t.slice(0,500));
  window.location.href='prepflow_chat.html';
}
function copyTranscript(){
  navigator.clipboard.writeText(document.getElementById('ytTranscript').textContent)
    .then(()=>alert('Copy ho gaya!'));
}

// Init
loadExam('cgl',null);
</script>
</body>
</html>
